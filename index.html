<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>b64audio</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    background: #0c0c0e;
    color: #d4d4d8;
    min-height: 100vh;
    padding: 0;
  }

  .app {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header {
    background: #18181b;
    border-bottom: 1px solid #27272a;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  header h1 {
    font-size: 1.1rem;
    color: #f4f4f5;
    font-weight: 600;
    white-space: nowrap;
  }

  header .badge {
    background: #f59e0b;
    color: #000;
    font-size: 0.6rem;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  header .tagline {
    color: #71717a;
    font-size: 0.78rem;
    margin-left: auto;
  }

  .b64-ticker {
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    font-size: 0.68rem;
    color: #3b82f6;
    background: #1a1a2e;
    padding: 3px 10px;
    border-radius: 4px;
    max-width: 260px;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .b64-ticker.active { opacity: 1; }

  .main-content {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .editor-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px 24px;
    gap: 16px;
    overflow-y: auto;
  }

  /* log sidebar */
  .log-sidebar {
    width: 300px;
    min-width: 300px;
    background: #18181b;
    border-left: 1px solid #27272a;
    display: flex;
    flex-direction: column;
  }

  .log-sidebar.hidden { display: none; }

  .log-header {
    padding: 12px 16px;
    border-bottom: 1px solid #27272a;
    font-size: 0.8rem;
    font-weight: 600;
    color: #a1a1aa;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .log-header .dot {
    width: 6px; height: 6px;
    background: #22c55e;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .log-entries {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .log-entry {
    padding: 8px 16px;
    font-size: 0.75rem;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    border-bottom: 1px solid #1e1e22;
    line-height: 1.5;
    animation: logSlideIn 0.2s ease-out;
  }

  @keyframes logSlideIn {
    from { opacity: 0; transform: translateX(8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .log-entry .time { color: #52525b; margin-right: 6px; }
  .log-entry.info { color: #a1a1aa; }
  .log-entry.success { color: #4ade80; }
  .log-entry.warn { color: #fbbf24; }
  .log-entry.error { color: #f87171; }
  .log-entry.op { color: #60a5fa; }

  .log-entry .detail {
    display: block;
    color: #52525b;
    margin-top: 2px;
    padding-left: 54px;
  }

  /* drop zone */
  #drop-zone {
    border: 2px dashed #3f3f46;
    border-radius: 12px;
    padding: 60px 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    background: #18181b;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  #drop-zone:hover { border-color: #60a5fa; background: #1a1a2e; }
  #drop-zone.drag-over { border-color: #60a5fa; background: #1a1a2e; box-shadow: 0 0 30px rgba(96,165,250,0.1); }

  #drop-zone .icon {
    width: 56px; height: 56px;
    border-radius: 12px;
    background: #27272a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
  }

  #drop-zone .title { color: #e4e4e7; font-size: 1rem; font-weight: 500; }
  #drop-zone .hint { color: #52525b; font-size: 0.8rem; }
  #file-input { display: none; }

  #editor { display: none; flex-direction: column; gap: 16px; flex: 1; }
  #editor.visible { display: flex; }

  .file-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 8px;
    padding: 10px 16px;
    flex-wrap: wrap;
  }

  .file-bar .name { font-weight: 600; color: #f4f4f5; font-size: 0.88rem; }

  .file-bar .meta {
    display: flex;
    gap: 16px;
    margin-left: auto;
  }

  .file-bar .meta span {
    font-size: 0.75rem;
    color: #71717a;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
  }

  .file-bar .meta span b { color: #a1a1aa; font-weight: 500; }

  /* waveform */
  .waveform-wrap {
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 8px;
    padding: 12px;
    position: relative;
  }

  #waveform {
    width: 100%;
    height: 140px;
    display: block;
    border-radius: 4px;
    background: #0f0f12;
  }

  .waveform-label {
    position: absolute;
    bottom: 16px;
    right: 16px;
    font-size: 0.65rem;
    color: #3f3f46;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .toolbar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .toolbar .sep {
    width: 1px;
    height: 24px;
    background: #27272a;
    margin: 0 6px;
  }

  button {
    background: #27272a;
    color: #d4d4d8;
    border: 1px solid #3f3f46;
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  button:hover { background: #3f3f46; border-color: #52525b; color: #f4f4f5; }
  button:active { background: #52525b; }
  button:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

  button.primary { background: #2563eb; border-color: #3b82f6; color: #fff; }
  button.primary:hover { background: #3b82f6; }
  button.success { background: #16a34a; border-color: #22c55e; color: #fff; }
  button.success:hover { background: #22c55e; }
  button.danger { background: #dc2626; border-color: #ef4444; color: #fff; }
  button.danger:hover { background: #ef4444; }

  /* download dropdown */
  .dl-menu {
    display: none;
    position: absolute;
    bottom: calc(100% + 6px);
    left: 0;
    background: #27272a;
    border: 1px solid #3f3f46;
    border-radius: 6px;
    overflow: hidden;
    z-index: 50;
    min-width: 140px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }

  .dl-menu.open { display: flex; flex-direction: column; }
  .dl-menu button { border: none; border-radius: 0; text-align: left; padding: 8px 14px; font-size: 0.8rem; background: transparent; }
  .dl-menu button:hover { background: #3f3f46; }

  /* op panels */
  .op-panel {
    display: none;
    background: #1e1e22;
    border: 1px solid #27272a;
    border-radius: 8px;
    padding: 16px 20px;
    gap: 14px;
    flex-direction: column;
    animation: panelIn 0.15s ease-out;
  }

  @keyframes panelIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .op-panel.visible { display: flex; }

  .op-panel .panel-title {
    font-size: 0.85rem;
    font-weight: 600;
    color: #e4e4e7;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .op-panel .panel-title .icon-sm {
    width: 20px; height: 20px;
    background: #3b82f6;
    border-radius: 4px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
  }

  .op-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

  .op-panel label {
    font-size: 0.78rem;
    color: #a1a1aa;
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
  }

  .op-panel label .lbl-text { min-width: 55px; color: #71717a; }

  input[type="range"] { flex: 1; accent-color: #3b82f6; height: 4px; }

  input[type="number"] {
    width: 80px;
    background: #0f0f12;
    border: 1px solid #3f3f46;
    border-radius: 4px;
    color: #e4e4e7;
    padding: 5px 8px;
    font-size: 0.82rem;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
  }

  input[type="number"]:focus { outline: none; border-color: #3b82f6; }

  .val-badge {
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    color: #60a5fa;
    font-size: 0.78rem;
    min-width: 42px;
    text-align: center;
    background: #1a1a2e;
    padding: 2px 6px;
    border-radius: 4px;
  }

  .op-actions {
    display: flex;
    gap: 8px;
    padding-top: 4px;
    border-top: 1px solid #27272a;
    margin-top: 2px;
  }

  /* toasts */
  #toast-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 0.8rem;
    font-weight: 500;
    animation: toastIn 0.25s ease-out, toastOut 0.3s ease-in 2.5s forwards;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    max-width: 320px;
  }

  .toast.success { background: #166534; color: #bbf7d0; border: 1px solid #22c55e; }
  .toast.error   { background: #7f1d1d; color: #fecaca; border: 1px solid #ef4444; }
  .toast.info    { background: #1e3a5f; color: #bfdbfe; border: 1px solid #3b82f6; }
  .toast.warn    { background: #713f12; color: #fef08a; border: 1px solid #f59e0b; }

  @keyframes toastIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-8px); } }

  /* processing overlay */
  .processing-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 999;
    align-items: center;
    justify-content: center;
  }

  .processing-overlay.visible { display: flex; }

  .processing-box {
    background: #27272a;
    border: 1px solid #3f3f46;
    border-radius: 12px;
    padding: 28px 40px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .spinner {
    width: 28px; height: 28px;
    border: 3px solid #3f3f46;
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .processing-box p { color: #a1a1aa; font-size: 0.85rem; }

  #audio-player { display: none; }

  @media (max-width: 860px) {
    .main-content { flex-direction: column; }
    .log-sidebar { width: 100%; min-width: 0; max-height: 220px; border-left: none; border-top: 1px solid #27272a; }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>b64audio</h1>
    <span class="badge">prototype</span>
    <span class="tagline">decode b64 > manipulate bytes > encode b64</span>
    <span class="b64-ticker" id="b64-ticker"></span>
  </header>

  <div class="main-content">
    <div class="editor-area">

      <div id="drop-zone" tabindex="0">
        <div class="icon">&#127925;</div>
        <div class="title">Drop an audio file here or click to browse</div>
        <div class="hint">MP3, WAV, OGG, FLAC then converted to WAV again so it's clean</div>
        <input type="file" id="file-input" accept="audio/*">
      </div>

      <div id="editor">

        <div class="file-bar">
          <span class="name" id="file-name">&mdash;</span>
          <div class="meta">
            <span><b id="meta-channels">-</b> ch</span>
            <span><b id="meta-rate">-</b> Hz</span>
            <span><b id="meta-duration">-</b>s</span>
            <span>b64: <b id="b64-length">0</b></span>
          </div>
        </div>

        <div class="waveform-wrap">
          <canvas id="waveform"></canvas>
          <span class="waveform-label">PCM waveform</span>
        </div>

        <div class="toolbar">
          <button id="btn-play" class="primary">&#9654; Play</button>
          <button id="btn-stop">Stop</button>
          <div class="sep"></div>
          <button id="btn-trim">Trim</button>
          <button id="btn-volume">Volume</button>
          <button id="btn-fadein">Fade in</button>
          <button id="btn-fadeout">Fade out</button>
          <div class="sep"></div>
          <button id="btn-undo" class="danger" disabled>&#8630; Undo</button>
          <div style="position:relative;display:inline-block;">
            <button id="btn-download" class="success">&#11015; Download &#9662;</button>
            <div id="download-menu" class="dl-menu">
              <button id="dl-wav">WAV file</button>
              <button id="dl-b64">Base64 text</button>
            </div>
          </div>
          <button id="btn-new" style="margin-left:auto;">New File</button>
        </div>

        <!-- trim -->
        <div class="op-panel" id="panel-trim">
          <div class="panel-title"><span class="icon-sm">&#9986;</span> Trim</div>
          <div class="op-row">
            <label>
              <span class="lbl-text">Start</span>
              <input type="range" id="trim-start" min="0" max="100" value="0">
              <span class="val-badge" id="trim-start-val">0%</span>
            </label>
          </div>
          <div class="op-row">
            <label>
              <span class="lbl-text">End</span>
              <input type="range" id="trim-end" min="0" max="100" value="100">
              <span class="val-badge" id="trim-end-val">100%</span>
            </label>
          </div>
          <div class="op-actions">
            <button id="apply-trim" class="primary">Apply trim</button>
            <button class="cancel-op">Cancel</button>
          </div>
        </div>

        <!-- volume -->
        <div class="op-panel" id="panel-volume">
          <div class="panel-title"><span class="icon-sm">&#128264;</span> Volume</div>
          <div class="op-row">
            <label>
              <span class="lbl-text">Multiplier</span>
              <input type="number" id="volume-mult" min="0" max="10" step="0.1" value="1.0">
              <span style="font-size:0.72rem; color:#52525b;">0.5 = half &middot; 2.0 = double</span>
            </label>
          </div>
          <div class="op-actions">
            <button id="apply-volume" class="primary">Apply volume</button>
            <button class="cancel-op">Cancel</button>
          </div>
        </div>

        <!-- fade in -->
        <div class="op-panel" id="panel-fadein">
          <div class="panel-title"><span class="icon-sm">&#8599;</span> Fade in</div>
          <div class="op-row">
            <label>
              <span class="lbl-text">Duration</span>
              <input type="range" id="fadein-pct" min="1" max="100" value="10">
              <span class="val-badge" id="fadein-pct-val">10%</span>
            </label>
          </div>
          <div class="op-actions">
            <button id="apply-fadein" class="primary">Apply fade in</button>
            <button class="cancel-op">Cancel</button>
          </div>
        </div>

        <!-- fade out -->
        <div class="op-panel" id="panel-fadeout">
          <div class="panel-title"><span class="icon-sm">&#8600;</span> Fade Out</div>
          <div class="op-row">
            <label>
              <span class="lbl-text">Duration</span>
              <input type="range" id="fadeout-pct" min="1" max="100" value="10">
              <span class="val-badge" id="fadeout-pct-val">10%</span>
            </label>
          </div>
          <div class="op-actions">
            <button id="apply-fadeout" class="primary">Apply fade out</button>
            <button class="cancel-op">Cancel</button>
          </div>
        </div>

      </div>
    </div>

    <div class="log-sidebar" id="log-sidebar">
      <div class="log-header"><span class="dot"></span> Logs</div>
      <div class="log-entries" id="log-entries"></div>
    </div>
  </div>
</div>

<div class="processing-overlay" id="processing">
  <div class="processing-box">
    <div class="spinner"></div>
    <p id="processing-msg">Processing...</p>
  </div>
</div>

<div id="toast-container"></div>
<audio id="audio-player"></audio>

<script>
var currentB64 = '';
var undoStack = [];
var mimeType = 'audio/wav';
var fileName = '';
var numChannels = 1;
var sampleRate = 44100;
var audioDuration = 0;

var dropZone = document.getElementById('drop-zone');
var fileInput = document.getElementById('file-input');
var editor = document.getElementById('editor');
var fileNameEl = document.getElementById('file-name');
var b64LenEl = document.getElementById('b64-length');
var metaCh = document.getElementById('meta-channels');
var metaRate = document.getElementById('meta-rate');
var metaDur = document.getElementById('meta-duration');
var canvas = document.getElementById('waveform');
var ctx = canvas.getContext('2d');
var audioPlayer = document.getElementById('audio-player');
var logEntries = document.getElementById('log-entries');
var processing = document.getElementById('processing');
var processingMsg = document.getElementById('processing-msg');

var WAV_HEADER = 44;

function log(msg, type, detail) {
  type = type || 'info';
  detail = detail || '';
  var now = new Date();
  var ts = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  var el = document.createElement('div');
  el.className = 'log-entry ' + type;
  el.innerHTML = '<span class="time">' + ts + '</span> ' + msg
    + (detail ? '<span class="detail">' + detail + '</span>' : '');
  logEntries.appendChild(el);
  logEntries.scrollTop = logEntries.scrollHeight;
}

function toast(msg, type) {
  type = type || 'success';
  var container = document.getElementById('toast-container');
  var el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(function() { el.remove(); }, 3000);
}

function showProcessing(msg) {
  processingMsg.textContent = msg || 'Processing...';
  processing.classList.add('visible');
}

function hideProcessing() {
  processing.classList.remove('visible');
}

function b64ToBytes(b64) {
  var bin = atob(b64);
  var bytes = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

function bytesToB64(bytes) {
  var chunks = [];
  var chunk = 8192;
  for (var i = 0; i < bytes.length; i += chunk) {
    var end = Math.min(i + chunk, bytes.length);
    var str = '';
    for (var j = i; j < end; j++) str += String.fromCharCode(bytes[j]);
    chunks.push(str);
  }
  return btoa(chunks.join(''));
}

function audioBufferToWav(audioBuffer) {
  var nc = audioBuffer.numberOfChannels;
  var sr = audioBuffer.sampleRate;
  var len = audioBuffer.length;
  var bps = 16;
  var blockAlign = nc * (bps / 8);
  var byteRate = sr * blockAlign;
  var dataSize = len * blockAlign;
  var buf = new ArrayBuffer(44 + dataSize);
  var view = new DataView(buf);

  function w(offset, str) {
    for (var i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
  }

  w(0, 'RIFF');
  view.setUint32(4, 44 + dataSize - 8, true);
  w(8, 'WAVE');
  w(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, nc, true);
  view.setUint32(24, sr, true);
  view.setUint32(28, byteRate, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, bps, true);
  w(36, 'data');
  view.setUint32(40, dataSize, true);

  var channels = [];
  for (var c = 0; c < nc; c++) channels.push(audioBuffer.getChannelData(c));

  var offset = 44;
  for (var i = 0; i < len; i++) {
    for (var c = 0; c < nc; c++) {
      var s = channels[c][i];
      s = Math.max(-1, Math.min(1, s));
      s = s < 0 ? s * 0x8000 : s * 0x7FFF;
      view.setInt16(offset, s, true);
      offset += 2;
    }
  }

  return new Uint8Array(buf);
}

function readWavMeta(bytes) {
  if (bytes.length < WAV_HEADER) return null;
  var view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
  return {
    channels: view.getUint16(22, true),
    sampleRate: view.getUint32(24, true),
    bitsPerSample: view.getUint16(34, true),
    dataSize: view.getUint32(40, true)
  };
}

function pushUndo() {
  undoStack.push(currentB64);
  document.getElementById('btn-undo').disabled = false;
}

function undo() {
  if (undoStack.length === 0) return;
  currentB64 = undoStack.pop();
  document.getElementById('btn-undo').disabled = undoStack.length === 0;
  refreshMeta();
  updateUI();
  log('Undo', 'warn', undoStack.length + ' left');
  toast('Undone', 'info');
}

function refreshMeta() {
  var bytes = b64ToBytes(currentB64);
  var meta = readWavMeta(bytes);
  if (meta) {
    numChannels = meta.channels;
    sampleRate = meta.sampleRate;
    var totalSamples = meta.dataSize / (meta.channels * (meta.bitsPerSample / 8));
    audioDuration = totalSamples / meta.sampleRate;
  }
}

function updateUI() {
  b64LenEl.textContent = currentB64.length.toLocaleString();
  metaCh.textContent = numChannels;
  metaRate.textContent = sampleRate.toLocaleString();
  metaDur.textContent = audioDuration.toFixed(2);
  drawWaveform();
}

function drawWaveform() {
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);

  var w = rect.width;
  var h = rect.height;
  var mid = h / 2;

  ctx.fillStyle = '#0f0f12';
  ctx.fillRect(0, 0, w, h);
  if (!currentB64) return;

  var bytes = b64ToBytes(currentB64);
  if (bytes.length <= WAV_HEADER) return;

  var view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
  var blockAlign = numChannels * 2;
  var pcmStart = WAV_HEADER;
  var pcmLen = bytes.length - pcmStart;
  var totalFrames = Math.floor(pcmLen / blockAlign);
  if (totalFrames <= 0) return;

  // center line
  ctx.strokeStyle = '#27272a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, mid);
  ctx.lineTo(w, mid);
  ctx.stroke();

  var grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, '#3b82f6');
  grad.addColorStop(0.5, '#60a5fa');
  grad.addColorStop(1, '#3b82f6');
  ctx.strokeStyle = grad;
  ctx.lineWidth = 1;

  var framesPerPixel = totalFrames / w;

  for (var x = 0; x < w; x++) {
    var frameStart = Math.floor(x * framesPerPixel);
    var frameEnd = Math.min(Math.floor((x + 1) * framesPerPixel), totalFrames);

    var minSample = 32767, maxSample = -32768;
    for (var f = frameStart; f < frameEnd; f++) {
      var byteOff = pcmStart + f * blockAlign;
      var sum = 0;
      for (var c = 0; c < numChannels; c++) {
        var off = byteOff + c * 2;
        if (off + 1 < bytes.length) sum += view.getInt16(off, true);
      }
      var avg = sum / numChannels;
      if (avg < minSample) minSample = avg;
      if (avg > maxSample) maxSample = avg;
    }

    if (frameStart >= frameEnd) continue;

    var yTop = mid - (maxSample / 32768) * mid;
    var yBot = mid - (minSample / 32768) * mid;
    ctx.beginPath();
    ctx.moveTo(x, yTop);
    ctx.lineTo(x, yBot);
    ctx.stroke();
  }
}

async function loadFile(file) {
  fileName = file.name;
  var originalType = file.type || 'audio/mpeg';

  log('Loading file...', 'info', fileName + ' (' + originalType + ', ' + (file.size / 1024).toFixed(1) + ' KB)');
  showProcessing('Decoding audio...');

  try {
    var arrayBuf = await file.arrayBuffer();
    var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var audioBuffer = await audioCtx.decodeAudioData(arrayBuf);
    audioCtx.close();

    numChannels = audioBuffer.numberOfChannels;
    sampleRate = audioBuffer.sampleRate;
    audioDuration = audioBuffer.duration;

    log('Decoded', 'success', numChannels + 'ch ' + sampleRate + 'Hz ' + audioDuration.toFixed(2) + 's');

    if (originalType !== 'audio/wav' && originalType !== 'audio/x-wav') {
      log('Converting to WAV', 'warn');
    }

    showProcessing('Encoding to WAV...');
    var wavBytes = audioBufferToWav(audioBuffer);

    showProcessing('Encoding to base64...');
    currentB64 = bytesToB64(wavBytes);
    mimeType = 'audio/wav';
    undoStack = [];
    document.getElementById('btn-undo').disabled = true;

    log('Ready', 'success', (wavBytes.length / 1024).toFixed(0) + 'KB wav, ' + currentB64.length.toLocaleString() + ' b64 chars');

    fileNameEl.textContent = fileName;
    dropZone.style.display = 'none';
    editor.classList.add('visible');
    updateUI();
    hideProcessing();
    toast('Loaded ' + fileName, 'success');
  } catch (err) {
    hideProcessing();
    log('Error: ' + err.message, 'error');
    toast('Couldnt decode file', 'error');
  }
}

function readSample(bytes, offset) {
  var s = bytes[offset] | (bytes[offset + 1] << 8);
  if (s >= 0x8000) s -= 0x10000;
  return s;
}

function writeSample(bytes, offset, value) {
  value = Math.max(-32768, Math.min(32767, Math.round(value)));
  if (value < 0) value += 0x10000;
  bytes[offset] = value & 0xff;
  bytes[offset + 1] = (value >> 8) & 0xff;
}

function applyTrim() {
  var startPct = parseInt(document.getElementById('trim-start').value) / 100;
  var endPct = parseInt(document.getElementById('trim-end').value) / 100;
  if (startPct >= endPct) { toast('Start must be less than end', 'error'); return; }

  showProcessing('Trimming...');
  log('Trim', 'op', 'Range: ' + (startPct * 100).toFixed(0) + '% - ' + (endPct * 100).toFixed(0) + '%');

  setTimeout(function() {
    pushUndo();
    var bytes = b64ToBytes(currentB64);
    var blockAlign = numChannels * 2;
    var pcm = bytes.slice(WAV_HEADER);
    var totalFrames = Math.floor(pcm.length / blockAlign);
    var frameStart = Math.floor(totalFrames * startPct) * blockAlign;
    var frameEnd = Math.floor(totalFrames * endPct) * blockAlign;
    var trimmed = pcm.slice(frameStart, frameEnd);

    var result = new Uint8Array(WAV_HEADER + trimmed.length);
    result.set(bytes.slice(0, WAV_HEADER), 0);
    result.set(trimmed, WAV_HEADER);
    var view = new DataView(result.buffer);
    view.setUint32(4, result.length - 8, true);
    view.setUint32(40, trimmed.length, true);

    currentB64 = bytesToB64(result);
    refreshMeta();
    closeAllPanels();
    updateUI();
    hideProcessing();

    var removedPct = (100 - (endPct - startPct) * 100).toFixed(1);
    log('Trimmed', 'success', 'cut ' + removedPct + '%, now ' + audioDuration.toFixed(2) + 's');
    toast('Trimmed', 'success');
  }, 20);
}

function applyVolume() {
  var mult = parseFloat(document.getElementById('volume-mult').value);
  if (isNaN(mult) || mult < 0) { toast('Enter a valid multiplier', 'error'); return; }

  showProcessing('Adjusting volume (' + mult + 'x)...');
  log('Volume', 'op', 'Multiplier: ' + mult + 'x');

  setTimeout(function() {
    pushUndo();
    var bytes = b64ToBytes(currentB64);

    for (var i = WAV_HEADER; i + 1 < bytes.length; i += 2) {
      writeSample(bytes, i, readSample(bytes, i) * mult);
    }

    currentB64 = bytesToB64(bytes);
    closeAllPanels();
    updateUI();
    hideProcessing();
    log('Volume ' + mult + 'x', 'success');
    toast('Volume changed', 'success');
  }, 20);
}

function applyFadeIn() {
  var pct = parseInt(document.getElementById('fadein-pct').value) / 100;

  showProcessing('Applying fade in (' + (pct * 100).toFixed(0) + '%)...');
  log('Fade In', 'op', 'Duration: ' + (pct * 100).toFixed(0) + '% of audio');

  setTimeout(function() {
    pushUndo();
    var bytes = b64ToBytes(currentB64);
    var blockAlign = numChannels * 2;
    var pcmLen = bytes.length - WAV_HEADER;
    var totalFrames = Math.floor(pcmLen / blockAlign);
    var fadeFrames = Math.floor(totalFrames * pct);

    for (var f = 0; f < fadeFrames; f++) {
      var factor = f / fadeFrames;
      var byteOff = WAV_HEADER + f * blockAlign;
      for (var c = 0; c < numChannels; c++) {
        var off = byteOff + c * 2;
        if (off + 1 < bytes.length) {
          writeSample(bytes, off, readSample(bytes, off) * factor);
        }
      }
    }

    currentB64 = bytesToB64(bytes);
    closeAllPanels();
    updateUI();
    hideProcessing();

    log('Fade in done', 'success', (pct * 100).toFixed(0) + '%');
    toast('Fade in done', 'success');
  }, 20);
}

function applyFadeOut() {
  var pct = parseInt(document.getElementById('fadeout-pct').value) / 100;

  showProcessing('Applying fade out (' + (pct * 100).toFixed(0) + '%)...');
  log('Fade Out', 'op', 'Duration: ' + (pct * 100).toFixed(0) + '% of audio');

  setTimeout(function() {
    pushUndo();
    var bytes = b64ToBytes(currentB64);
    var blockAlign = numChannels * 2;
    var pcmLen = bytes.length - WAV_HEADER;
    var totalFrames = Math.floor(pcmLen / blockAlign);
    var fadeFrames = Math.floor(totalFrames * pct);
    var fadeStart = totalFrames - fadeFrames;

    for (var f = fadeStart; f < totalFrames; f++) {
      var factor = (totalFrames - f) / fadeFrames;
      var byteOff = WAV_HEADER + f * blockAlign;
      for (var c = 0; c < numChannels; c++) {
        var off = byteOff + c * 2;
        if (off + 1 < bytes.length) {
          writeSample(bytes, off, readSample(bytes, off) * factor);
        }
      }
    }

    currentB64 = bytesToB64(bytes);
    closeAllPanels();
    updateUI();
    hideProcessing();

    log('Fade out done', 'success', (pct * 100).toFixed(0) + '%');
    toast('Fade out done', 'success');
  }, 20);
}

var currentObjUrl = null;
var tickerInterval = null;
var b64Ticker = document.getElementById('b64-ticker');

function updateTicker() {
  if (!currentB64 || audioPlayer.paused) return;
  var progress = audioPlayer.currentTime / (audioPlayer.duration || 1);
  var idx = Math.floor(progress * (currentB64.length - 32));
  b64Ticker.textContent = currentB64.substring(idx, idx + 32);
}

function startTicker() {
  b64Ticker.classList.add('active');
  tickerInterval = setInterval(updateTicker, 80);
}

function stopTicker() {
  clearInterval(tickerInterval);
  tickerInterval = null;
  b64Ticker.classList.remove('active');
}

function play() {
  stop();
  var bytes = b64ToBytes(currentB64);
  var blob = new Blob([bytes], { type: mimeType });
  currentObjUrl = URL.createObjectURL(blob);
  audioPlayer.src = currentObjUrl;
  audioPlayer.load();
  audioPlayer.play();
  startTicker();
  log('Playing', 'info');
}

audioPlayer.addEventListener('ended', stopTicker);

function stop() {
  audioPlayer.pause();
  audioPlayer.currentTime = 0;
  stopTicker();
  if (currentObjUrl) { URL.revokeObjectURL(currentObjUrl); currentObjUrl = null; }
}

var dlMenu = document.getElementById('download-menu');

function downloadWav() {
  var bytes = b64ToBytes(currentB64);
  var blob = new Blob([bytes], { type: mimeType });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  var baseName = fileName.replace(/\.[^.]+$/, '');
  a.download = baseName + '_edited.wav';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  log('Saved ' + a.download, 'success');
  toast('Downloading wav', 'info');
}

function downloadB64() {
  var blob = new Blob([currentB64], { type: 'text/plain' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  var baseName = fileName.replace(/\.[^.]+$/, '');
  a.download = baseName + '_edited.b64.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  log('Saved ' + a.download, 'success', currentB64.length.toLocaleString() + ' chars');
  toast('Downloading b64', 'info');
}

var allPanels = [
  document.getElementById('panel-trim'),
  document.getElementById('panel-volume'),
  document.getElementById('panel-fadein'),
  document.getElementById('panel-fadeout')
];

function closeAllPanels() { allPanels.forEach(function(p) { p.classList.remove('visible'); }); }

function togglePanel(panel) {
  var was = panel.classList.contains('visible');
  closeAllPanels();
  if (!was) panel.classList.add('visible');
}

dropZone.addEventListener('click', function() { fileInput.click(); });
dropZone.addEventListener('keydown', function(e) { if (e.key === 'Enter' || e.key === ' ') fileInput.click(); });
dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('drag-over'); });
dropZone.addEventListener('drop', function(e) {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files.length > 0) loadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', function(e) { if (e.target.files.length > 0) loadFile(e.target.files[0]); });

document.getElementById('btn-play').addEventListener('click', play);
document.getElementById('btn-stop').addEventListener('click', stop);
document.getElementById('btn-download').addEventListener('click', function(e) {
  e.stopPropagation();
  dlMenu.classList.toggle('open');
});
document.getElementById('dl-wav').addEventListener('click', function() { dlMenu.classList.remove('open'); downloadWav(); });
document.getElementById('dl-b64').addEventListener('click', function() { dlMenu.classList.remove('open'); downloadB64(); });
document.addEventListener('click', function() { dlMenu.classList.remove('open'); });
document.getElementById('btn-undo').addEventListener('click', undo);

document.getElementById('btn-new').addEventListener('click', function() {
  stop();
  currentB64 = '';
  undoStack = [];
  fileName = '';
  editor.classList.remove('visible');
  dropZone.style.display = '';
  closeAllPanels();
  fileInput.value = '';
  log('Reset', 'warn');
});

document.getElementById('btn-trim').addEventListener('click', function() { togglePanel(document.getElementById('panel-trim')); });
document.getElementById('btn-volume').addEventListener('click', function() { togglePanel(document.getElementById('panel-volume')); });
document.getElementById('btn-fadein').addEventListener('click', function() { togglePanel(document.getElementById('panel-fadein')); });
document.getElementById('btn-fadeout').addEventListener('click', function() { togglePanel(document.getElementById('panel-fadeout')); });

document.querySelectorAll('.cancel-op').forEach(function(btn) { btn.addEventListener('click', closeAllPanels); });

document.getElementById('apply-trim').addEventListener('click', applyTrim);
document.getElementById('apply-volume').addEventListener('click', applyVolume);
document.getElementById('apply-fadein').addEventListener('click', applyFadeIn);
document.getElementById('apply-fadeout').addEventListener('click', applyFadeOut);

document.getElementById('trim-start').addEventListener('input', function() { document.getElementById('trim-start-val').textContent = this.value + '%'; });
document.getElementById('trim-end').addEventListener('input', function() { document.getElementById('trim-end-val').textContent = this.value + '%'; });
document.getElementById('fadein-pct').addEventListener('input', function() { document.getElementById('fadein-pct-val').textContent = this.value + '%'; });
document.getElementById('fadeout-pct').addEventListener('input', function() { document.getElementById('fadeout-pct-val').textContent = this.value + '%'; });

window.addEventListener('resize', drawWaveform);

log('Ready', 'info');
</script>
</body>
</html>
